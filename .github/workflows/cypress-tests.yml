name: Cypress E2E Tests
on:
 # push:
 #   branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # Ya jo bhi aap use kar rahe ho

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # Agar aapka server run karna zaroori hai to niche wali lines uncomment karein:
          # start: npm start
          # wait-on: 'http://localhost:3000'
          browser: chrome
          headed: true
          env:
           CYPRESS_ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: Upload Screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Videos (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos